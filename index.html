<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Assistant Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #090d16;
            --container-bg: rgba(18, 24, 38, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(99, 102, 241, 0.3);
            --accent-primary: #6366f1; /* Indigo */
            --accent-glow: #818cf8;
            --accent-secondary: #10b981; /* Emerald */
            --accent-recording: #ef4444; /* Red */
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --user-bubble: linear-gradient(135deg, rgba(99, 102, 241, 0.25), rgba(79, 70, 229, 0.15));
            --ai-bubble: rgba(255, 255, 255, 0.04);
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.18) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 60%);
        }

        .dashboard-container {
            width: 92%;
            max-width: 960px;
            height: 88vh;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            position: relative;
        }

        /* Visualizer Overlay Canvas */
        .visualizer-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            pointer-events: none;
            opacity: 0.6;
            z-index: 1;
        }

        /* Header Style */
        header {
            padding: 18px 28px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(11, 15, 25, 0.6);
            z-index: 2;
            gap: 16px;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .status-dot {
            width: 9px;
            height: 9px;
            background-color: #e5e7eb;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .status-dot.online {
            background-color: var(--accent-secondary);
            box-shadow: 0 0 10px var(--accent-secondary);
        }

        .status-dot.offline {
            background-color: var(--accent-recording);
            box-shadow: 0 0 10px var(--accent-recording);
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c4b5fd, #818cf8, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .model-selector-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .model-selector-container label {
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        select {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 7px 14px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover, select:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.25);
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Chat Area Style */
        .chat-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
            z-index: 2;
        }

        .chat-area::-webkit-scrollbar {
            width: 6px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Message Bubbles */
        .message-bubble {
            max-width: 78%;
            padding: 16px 20px;
            border-radius: 20px;
            line-height: 1.55;
            position: relative;
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            font-size: 0.94rem;
            backdrop-filter: blur(10px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(12px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .message-user {
            background: var(--user-bubble);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid var(--border-highlight);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
        }

        .message-assistant {
            background: var(--ai-bubble);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .message-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .source-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
            color: var(--accent-glow);
        }

        .message-text {
            color: var(--text-main);
            word-break: break-word;
            white-space: pre-wrap;
        }

        /* Audio Player Bar */
        .audio-player-bar {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.25);
            padding: 8px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .play-btn {
            width: 32px;
            height: 32px;
            background: var(--accent-primary);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: justify;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.4);
            padding-left: 3px;
        }

        .play-btn:hover {
            transform: scale(1.08);
            background: var(--accent-glow);
        }

        .audio-info {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        /* Typing Indicator */
        .typing-indicator {
            align-self: flex-start;
            background: var(--ai-bubble);
            padding: 14px 20px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
            display: none;
            align-items: center;
            gap: 6px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--accent-glow);
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1.1); opacity: 1; }
        }

        /* Input Container */
        .input-container {
            padding: 18px 28px;
            border-top: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.6);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 2;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-container input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px 48px 14px 20px;
            border-radius: 16px;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .input-container input:focus {
            border-color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 16px rgba(99, 102, 241, 0.2);
        }

        .mic-btn {
            position: absolute;
            right: 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.25 ease;
        }

        .mic-btn:hover {
            color: var(--accent-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .mic-btn.recording {
            color: white;
            background: var(--accent-recording);
            animation: micPulse 1.2s infinite ease-in-out;
        }

        @keyframes micPulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .send-btn {
            background: linear-gradient(135deg, var(--accent-primary), #4f46e5);
            border: none;
            color: white;
            padding: 14px 26px;
            border-radius: 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .send-btn:hover {
            background: linear-gradient(135deg, var(--accent-glow), #4338ca);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.5);
            transform: translateY(-1px);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            margin: auto;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            stroke: var(--accent-glow);
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Visualizer Canvas -->
        <canvas class="visualizer-canvas" id="visualizerCanvas"></canvas>

        <header>
            <div class="header-title-container">
                <div class="status-badge">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">Connecting...</span>
                </div>
                <h1>AI Voice Assistant Console</h1>
            </div>
            
            <div class="header-controls">
                <div class="model-selector-container">
                    <label for="modelSelect">Gemini Model:</label>
                    <select id="modelSelect" onchange="changeModel()">
                        <option value="gemini-1.5-flash">Gemini 1.5 Flash (Fast)</option>
                        <option value="gemini-1.5-pro">Gemini 1.5 Pro (Smart)</option>
                        <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
                    </select>
                </div>
                <div class="model-selector-container">
                    <label for="nameInput">Robot Name:</label>
                    <input type="text" id="nameInput" value="Jarvis" onchange="changeAssistantName()" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: #fff; border-radius: 6px; padding: 4px 8px; width: 90px; font-size: 0.85rem;" />
                </div>
                <button class="icon-btn" onclick="clearHistoryUI()" title="Clear Console Log">🗑️</button>
            </div>
        </header>

        <div class="chat-area" id="chatArea">
            <div class="empty-state" id="emptyState">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <p>Speak via ESP32 hardware or send a web query below.</p>
            </div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <span style="font-size: 0.8rem; color: var(--text-muted); margin-left: 4px;">Thinking...</span>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input type="text" id="textInput" placeholder="Ask XiaoZhi voice assistant..." onkeypress="handleKeyPress(event)">
                <button class="mic-btn" id="micBtn" onclick="toggleVoiceRecording()" title="Speak to assistant">🎙️</button>
            </div>
            <button class="send-btn" onclick="sendTextMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://voice-assist-bi8y.onrender.com';

        function getApiUrl(endpoint) {
            const base = API_BASE.trim().replace(/\/+$/, '');
            const path = endpoint.trim().replace(/^\/+/, '');
            return base + '/' + path;
        }

        function getFetchOptions(customOptions = {}) {
            const headers = {};
            if (customOptions.method && customOptions.method !== 'GET') {
                headers['Content-Type'] = 'application/json';
            }
            return {
                ...customOptions,
                headers: {
                    ...headers,
                    ...(customOptions.headers || {})
                }
            };
        }

        async function loadActiveModel() {
            try {
                const response = await fetch(getApiUrl('model'), getFetchOptions());
                const data = await response.json();
                if (data.active_model && document.getElementById('modelSelect')) {
                    document.getElementById('modelSelect').value = data.active_model;
                }
            } catch (error) {
                console.error("Error loading active model:", error);
            }
        }

        async function changeModel() {
            const select = document.getElementById('modelSelect');
            if (!select) return;
            const selectedModel = select.value;
            try {
                const response = await fetch(getApiUrl('model'), getFetchOptions({
                    method: 'POST',
                    body: JSON.stringify({ model: selectedModel })
                }));
                const data = await response.json();
                console.log('Server Gemini model updated to:', data);
            } catch (error) {
                console.error('Failed to change Gemini model:', error);
            }
        }

        let lastMessageCount = 0;
        let isRecording = false;
        let speechRecognition = null;
        let audioCtx = null;
        let analyser = null;
        let animationFrame = null;

        // Initialize Speech Recognition if supported
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechClass = window.SpeechRecognition || window.webkitSpeechRecognition;
            speechRecognition = new SpeechClass();
            speechRecognition.continuous = false;
            speechRecognition.interimResults = true;
            speechRecognition.lang = 'en-US';

            speechRecognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('textInput').value = transcript;
            };

            speechRecognition.onerror = (event) => {
                console.warn('Speech recognition error:', event.error);
                stopVoiceRecording();
            };

            speechRecognition.onend = () => {
                stopVoiceRecording();
            };
        }

        // Toggle Voice Microphone Recording
        function toggleVoiceRecording() {
            if (!speechRecognition) {
                alert('Speech Recognition is not supported by your browser. Please type your message.');
                return;
            }

            if (isRecording) {
                speechRecognition.stop();
                stopVoiceRecording();
            } else {
                try {
                    speechRecognition.start();
                    isRecording = true;
                    const micBtn = document.getElementById('micBtn');
                    micBtn.classList.add('recording');
                    micBtn.title = 'Listening... Click to stop';
                    startVisualizerDummy();
                } catch (e) {
                    console.error('Mic start error:', e);
                }
            }
        }

        function stopVoiceRecording() {
            isRecording = false;
            const micBtn = document.getElementById('micBtn');
            micBtn.classList.remove('recording');
            micBtn.title = 'Speak to assistant';
            stopVisualizer();
        }

        // Server Health Connection Check
        async function checkServerHealth() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            // Set initial state if still on Connecting
            if (text.textContent === 'Connecting...') {
                text.textContent = 'Waking up server...';
            }

            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);
                
                const response = await fetch(getApiUrl('history'), getFetchOptions({ 
                    method: 'GET',
                    signal: controller.signal
                }));
                clearTimeout(timeoutId);

                if (response.ok) {
                    dot.className = 'status-dot online';
                    text.textContent = API_BASE.includes('loca.lt') ? 'Local Tunnel Online' : (API_BASE.includes('localhost') ? 'Localhost Online' : 'Render Cloud Online');
                } else {
                    dot.className = 'status-dot offline';
                    text.textContent = 'Server Error (' + response.status + ')';
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    dot.className = 'status-dot';
                    text.textContent = 'Waking Server... (Wait 30s)';
                } else {
                    dot.className = 'status-dot offline';
                    text.textContent = 'Server Offline';
                }
            }
        }

        // Fetch chat history from backend
        async function fetchHistory() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);

                const response = await fetch(getApiUrl('history'), getFetchOptions({ signal: controller.signal }));
                clearTimeout(timeoutId);
                const data = await response.json();
                
                if (data.history && data.history.length !== lastMessageCount) {
                    renderMessages(data.history);
                    lastMessageCount = data.history.length;
                    scrollToBottom();
                }
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                dot.className = 'status-dot online';
                text.textContent = API_BASE.includes('loca.lt') ? 'Local Tunnel Online' : (API_BASE.includes('localhost') ? 'Localhost Online' : 'Render Cloud Online');
            } catch (error) {
                checkServerHealth();
            }
        }

        // Render messages array
        function renderMessages(history) {
            const chatArea = document.getElementById('chatArea');
            const emptyState = document.getElementById('emptyState');

            if (history.length === 0) {
                emptyState.style.display = 'block';
                return;
            } else if (emptyState) {
                emptyState.style.display = 'none';
            }

            chatArea.querySelectorAll('.message-bubble').forEach(el => el.remove());

            history.forEach(msg => {
                const isUser = msg.sender === 'user';
                const bubble = document.createElement('div');
                bubble.className = `message-bubble ${isUser ? 'message-user' : 'message-assistant'}`;

                // Meta Header
                const meta = document.createElement('div');
                meta.className = 'message-meta';
                
                const sourceLabel = msg.source === 'voice' ? '🎙️ Voice' : '💻 Web';
                meta.innerHTML = `
                    <span class="source-tag">${sourceLabel}</span>
                    <span>${msg.timestamp || ''}</span>
                `;
                bubble.appendChild(meta);

                // Message Text
                const textSpan = document.createElement('div');
                textSpan.className = 'message-text';
                textSpan.textContent = msg.text;
                bubble.appendChild(textSpan);

                // Audio player control if speech file exists
                if (!isUser && msg.audio) {
                    const audioPlayer = document.createElement('div');
                    audioPlayer.className = 'audio-player-bar';
                    audioPlayer.innerHTML = `
                        <button class="play-btn" onclick="playAudio('${msg.audio}', this)">▶</button>
                        <span class="audio-info">Voice Output</span>
                    `;
                    bubble.appendChild(audioPlayer);
                }

                chatArea.appendChild(bubble);
            });
        }

        // Play audio response & trigger visualizer
        function playAudio(audioUrl, btnElement) {
            const audio = new Audio(audioUrl);
            btnElement.textContent = '⏸';
            startVisualizerDummy();

            audio.play().then(() => {
                audio.onended = () => {
                    btnElement.textContent = '▶';
                    stopVisualizer();
                };
            }).catch(err => {
                console.error('Audio playback error:', err);
                btnElement.textContent = '▶';
                stopVisualizer();
            });
        }

        function scrollToBottom() {
            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function appendSingleMessage(msg) {
            const chatArea = document.getElementById('chatArea');
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.style.display = 'none';

            const isUser = msg.sender === 'user';
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isUser ? 'message-user' : 'message-assistant'}`;

            const meta = document.createElement('div');
            meta.className = 'message-meta';
            const sourceLabel = msg.source === 'voice' ? '🎙️ Voice' : '💻 Web';
            meta.innerHTML = `
                <span class="source-tag">${sourceLabel}</span>
                <span>${msg.timestamp || new Date().toLocaleTimeString()}</span>
            `;
            bubble.appendChild(meta);

            const textSpan = document.createElement('div');
            textSpan.className = 'message-text';
            textSpan.textContent = msg.text;
            bubble.appendChild(textSpan);

            if (!isUser && msg.audio) {
                const audioPlayer = document.createElement('div');
                audioPlayer.className = 'audio-player-bar';
                audioPlayer.innerHTML = `
                    <button class="play-btn" onclick="playAudio('${msg.audio}', this)">▶</button>
                    <span class="audio-info">Voice Output</span>
                `;
                bubble.appendChild(audioPlayer);
            }

            chatArea.appendChild(bubble);
            scrollToBottom();
        }

        // Send text message with instant UI feedback
        async function sendTextMessage() {
            const input = document.getElementById('textInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            
            // Render user bubble immediately
            appendSingleMessage({
                sender: 'user',
                text: text,
                source: 'web',
                timestamp: new Date().toLocaleTimeString()
            });
            showTyping(true);

            try {
                const url = getApiUrl('chat');
                console.log('Sending chat POST to:', url);
                const response = await fetch(url, getFetchOptions({
                    method: 'POST',
                    body: JSON.stringify({ text: text })
                }));
                
                if (!response.ok) {
                    throw new Error('Server returned HTTP ' + response.status);
                }

                const data = await response.json();
                showTyping(false);

                const replyText = data.reply || data.text || "Hello! I am your AI voice assistant. How can I help you?";
                appendSingleMessage({
                    sender: 'assistant',
                    text: replyText,
                    source: 'web',
                    audio: data.audio,
                    timestamp: new Date().toLocaleTimeString()
                });

                // Audio plays exclusively on ESP32 Hardware Speaker (Laptop playback disabled)
            } catch (error) {
                console.error("Error sending message:", error);
                showTyping(false);
                appendSingleMessage({
                    sender: 'assistant',
                    text: "Sorry, I had trouble reaching the server (" + error.message + "). Please try again.",
                    source: 'web',
                    audio: null,
                    timestamp: new Date().toLocaleTimeString()
                });
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendTextMessage();
            }
        }

        function showTyping(show) {
            const indicator = document.getElementById('typingIndicator');
            indicator.style.display = show ? 'flex' : 'none';
            if (show) scrollToBottom();
        }

        // Model selector change
        async function changeModel() {
            const select = document.getElementById('modelSelect');
            const model = select.value;
            try {
                await fetch(getApiUrl('model'), getFetchOptions({
                    method: 'POST',
                    body: JSON.stringify({ model: model })
                }));
            } catch (error) {
                console.error("Error setting active model:", error);
            }
        }

        async function changeAssistantName() {
            const input = document.getElementById('nameInput');
            const name = input ? input.value.trim() : 'Jarvis';
            try {
                await fetch(getApiUrl('name'), getFetchOptions({
                    method: 'POST',
                    body: JSON.stringify({ name: name })
                }));
            } catch (error) {
                console.error("Error setting assistant name:", error);
            }
        }

        async function loadAssistantName() {
            try {
                const response = await fetch(getApiUrl('name'), getFetchOptions());
                const data = await response.json();
                if (data.assistant_name && document.getElementById('nameInput')) {
                    document.getElementById('nameInput').value = data.assistant_name;
                }
            } catch (error) {
                console.error("Error loading assistant name:", error);
            }
        }

        function clearHistoryUI() {
            const chatArea = document.getElementById('chatArea');
            chatArea.querySelectorAll('.message-bubble').forEach(el => el.remove());
            const emptyState = document.getElementById('emptyState');
            if (emptyState) emptyState.style.display = 'block';
        }

        // Canvas Waveform Animation
        function startVisualizerDummy() {
            const canvas = document.getElementById('visualizerCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            let step = 0;
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
                ctx.moveTo(0, canvas.height / 2);

                for (let x = 0; x < canvas.width; x += 10) {
                    const y = Math.sin(x * 0.02 + step) * 15 * Math.sin(step * 0.5) + canvas.height / 2;
                    ctx.lineTo(x, y);
                }

                ctx.strokeStyle = 'rgba(99, 102, 241, 0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                step += 0.1;
                animationFrame = requestAnimationFrame(draw);
            }
            draw();
        }

        function stopVisualizer() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
            }
            const canvas = document.getElementById('visualizerCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        window.onload = () => {
            loadActiveModel();
            loadAssistantName();
            fetchHistory();
            setInterval(fetchHistory, 2000);
        };
    </script>
</body>
</html>
